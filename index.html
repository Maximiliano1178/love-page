<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Love Page</title>

    <style>
        body{
            background: pink;
            font-family: Arial;
            text-align: center;
            margin-top: 200px;
        }

        h1{
            font-size: 40px;
        }

        button{
            padding: 15px 30px;
            font-size: 20px;
            margin: 10px;
            border: none;
            border-radius: 10px;
            cursor: pointer;
        }

        .yes{
            background: green;
            color: white;
        }

        .no{
            background: red;
            color: white;
        }
    </style>
</head>

<body>

    <h1 id="texto">Do you want to be my girlfriend? 💖</h1>

    <button class="yes" id="yesBtn" onclick="yes()">Yes</button>
    <button class="no" id="noBtn" onclick="no()">No</button>

    <script>

        let preguntaNo = false;

        function yes(){

            if(preguntaNo == false){

                window.location.href =
                "https://maximiliano1178.github.io/index.html/";

            }else{

                document.getElementById("texto").innerHTML =
                "😢";

                document.getElementById("yesBtn").disabled = true;
                document.getElementById("noBtn").disabled = true;
            }
        }

        function no(){

            if(preguntaNo == false){

                document.getElementById("texto").innerHTML =
                "Are you sure?";

                preguntaNo = true;

            }else{

                document.getElementById("texto").innerHTML =
                "Do you want to be my girlfriend? 💖";

                preguntaNo = false;
            }
        }

    </script>

</body>
</html>
